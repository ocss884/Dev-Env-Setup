name: Build and Push Dev Image

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      build_variant:
        description: Image variant to build
        required: false
        default: all
        type: choice
        options:
          - all
          - dev
          - dev-cu13
          - custom
      base_image:
        description: Base image to extend when build_variant is custom
        required: false
        default: lmsysorg/sglang:dev
      image_name:
        description: Docker Hub repository name under your namespace when build_variant is custom
        required: false
        default: sglang
      image_tag:
        description: Primary Docker tag to publish when build_variant is custom
        required: false
        default: dev
  push:
    branches:
      - main
    paths:
      - docker/Dockerfile
      - docker/.dockerignore
      - .github/workflows/build-and-push.yml

env:
  DEFAULT_BASE_IMAGE: lmsysorg/sglang:dev
  DEFAULT_CU13_BASE_IMAGE: lmsysorg/sglang:dev-cu13
  DEFAULT_IMAGE_NAME: sglang
  DEFAULT_IMAGE_TAG: dev
  DEFAULT_CU13_IMAGE_TAG: dev-cu13
  DEFAULT_BUILD_VARIANT: all

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      variant_matrix: ${{ steps.cfg.outputs.variant_matrix }}
      build_matrix: ${{ steps.cfg.outputs.build_matrix }}
    steps:
      - name: Resolve build settings
        id: cfg
        shell: bash
        run: |
          build_variant="${{ github.event.inputs.build_variant }}"
          base_image="${{ github.event.inputs.base_image }}"
          image_name="${{ github.event.inputs.image_name }}"
          image_tag="${{ github.event.inputs.image_tag }}"

          if [ -z "$build_variant" ]; then
            build_variant="${DEFAULT_BUILD_VARIANT}"
          fi

          if [ -z "$base_image" ]; then
            base_image="${DEFAULT_BASE_IMAGE}"
          fi

          if [ -z "$image_name" ]; then
            image_name="${DEFAULT_IMAGE_NAME}"
          fi

          if [ -z "$image_tag" ]; then
            image_tag="${DEFAULT_IMAGE_TAG}"
          fi

          case "$build_variant" in
            all)
              variant_matrix="$(jq -cn \
                --arg default_base_image "$DEFAULT_BASE_IMAGE" \
                --arg cu13_base_image "$DEFAULT_CU13_BASE_IMAGE" \
                --arg image_name "$DEFAULT_IMAGE_NAME" \
                --arg default_image_tag "$DEFAULT_IMAGE_TAG" \
                --arg cu13_image_tag "$DEFAULT_CU13_IMAGE_TAG" \
                '{include:[
                  {variant:"dev",base_image:$default_base_image,image_name:$image_name,image_tag:$default_image_tag},
                  {variant:"dev-cu13",base_image:$cu13_base_image,image_name:$image_name,image_tag:$cu13_image_tag}
                ]}')"
              ;;
            dev)
              variant_matrix="$(jq -cn \
                --arg base_image "$DEFAULT_BASE_IMAGE" \
                --arg image_name "$DEFAULT_IMAGE_NAME" \
                --arg image_tag "$DEFAULT_IMAGE_TAG" \
                '{include:[{variant:"dev",base_image:$base_image,image_name:$image_name,image_tag:$image_tag}]}')"
              ;;
            dev-cu13)
              variant_matrix="$(jq -cn \
                --arg base_image "$DEFAULT_CU13_BASE_IMAGE" \
                --arg image_name "$DEFAULT_IMAGE_NAME" \
                --arg image_tag "$DEFAULT_CU13_IMAGE_TAG" \
                '{include:[{variant:"dev-cu13",base_image:$base_image,image_name:$image_name,image_tag:$image_tag}]}')"
              ;;
            custom)
              variant_matrix="$(jq -cn \
                --arg base_image "$base_image" \
                --arg image_name "$image_name" \
                --arg image_tag "$image_tag" \
                '{include:[{variant:"custom",base_image:$base_image,image_name:$image_name,image_tag:$image_tag}]}')"
              ;;
            *)
              echo "Unsupported build_variant: $build_variant" >&2
              exit 1
              ;;
          esac

          build_matrix="$(jq -c '
            {include: [
              .include[] as $variant
              | ["linux/amd64","linux/arm64"][] as $platform
              | $variant + {platform:$platform, arch: ($platform | split("/") | .[1])}
            ]}
          ' <<< "$variant_matrix")"

          echo "variant_matrix=$variant_matrix" >> "$GITHUB_OUTPUT"
          echo "build_matrix=$build_matrix" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.variant }} ${{ matrix.platform }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.build_matrix) }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space on runner
        shell: bash
        run: |
          df -h
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          docker system prune -af || true
          df -h

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./docker
          file: ./docker/Dockerfile
          platforms: ${{ matrix.platform }}
          pull: true
          push: true
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
            SSH_PUBLIC_KEY=${{ secrets.SSH_PUBLIC_KEY }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=Extended dev image built from ${{ matrix.base_image }}
          outputs: type=image,name=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image_name }},name-canonical=true,push-by-digest=true

      - name: Export digest
        shell: bash
        run: |
          mkdir -p "/tmp/digests/${{ matrix.variant }}"
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${{ matrix.variant }}/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.variant }}-${{ matrix.arch }}
          path: /tmp/digests/${{ matrix.variant }}/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge ${{ matrix.variant }}
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.variant_matrix) }}
    steps:
      - name: Download digest artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.variant }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        shell: bash
        run: |
          shopt -s nullglob
          refs=()
          for digest_file in *; do
            refs+=("${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image_name }}@sha256:${digest_file}")
          done

          if [ "${#refs[@]}" -eq 0 ]; then
            echo "No digests were downloaded for manifest creation" >&2
            exit 1
          fi

          docker buildx imagetools create \
            --tag "${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image_name }}:${{ matrix.image_tag }}" \
            "${refs[@]}"
