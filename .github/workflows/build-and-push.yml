name: Build and Push Dev Image

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      base_image:
        description: Base image to extend
        required: false
        default: lmsysorg/sglang:dev
      image_name:
        description: Docker Hub repository name under your namespace
        required: false
        default: sglang
      image_tag:
        description: Primary Docker tag to publish
        required: false
        default: dev
  push:
    branches:
      - main
    paths:
      - docker/Dockerfile
      - docker/.dockerignore
      - .github/workflows/build-and-push.yml

env:
  DEFAULT_BASE_IMAGE: lmsysorg/sglang:dev
  DEFAULT_IMAGE_NAME: sglang
  DEFAULT_IMAGE_TAG: dev

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      base_image: ${{ steps.cfg.outputs.base_image }}
      image_name: ${{ steps.cfg.outputs.image_name }}
      image_tag: ${{ steps.cfg.outputs.image_tag }}
      image_repo: ${{ steps.cfg.outputs.image_repo }}
    steps:
      - name: Resolve build settings
        id: cfg
        shell: bash
        run: |
          base_image="${{ github.event.inputs.base_image }}"
          image_name="${{ github.event.inputs.image_name }}"
          image_tag="${{ github.event.inputs.image_tag }}"

          if [ -z "$base_image" ]; then
            base_image="${DEFAULT_BASE_IMAGE}"
          fi

          if [ -z "$image_name" ]; then
            image_name="${DEFAULT_IMAGE_NAME}"
          fi

          if [ -z "$image_tag" ]; then
            image_tag="${DEFAULT_IMAGE_TAG}"
          fi

          image_repo="${{ secrets.DOCKERHUB_USERNAME }}/${image_name}"

          echo "base_image=$base_image" >> "$GITHUB_OUTPUT"
          echo "image_name=$image_name" >> "$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "image_repo=$image_repo" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space on runner
        shell: bash
        run: |
          df -h
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          docker system prune -af || true
          df -h

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./docker
          file: ./docker/Dockerfile
          platforms: ${{ matrix.platform }}
          pull: true
          push: true
          build-args: |
            BASE_IMAGE=${{ needs.prepare.outputs.base_image }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=Extended dev image built from ${{ needs.prepare.outputs.base_image }}
          outputs: type=image,name=${{ needs.prepare.outputs.image_repo }},name-canonical=true,push-by-digest=true

      - name: Export digest
        shell: bash
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    steps:
      - name: Download digest artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        shell: bash
        run: |
          docker buildx imagetools create \
            --tag "${{ needs.prepare.outputs.image_repo }}:${{ needs.prepare.outputs.image_tag }}" \
            $(printf '%s@sha256:%s ' "${{ needs.prepare.outputs.image_repo }}" *)
